<svg width="100%" viewBox="215 55 310 100" xmlns="http://www.w3.org/2000/svg">

  <!-- Icon mark: terminal prompt > inside a minimal square -->
  <rect x="220" y="60" width="80" height="80" rx="8" fill="#0d0d0d" stroke="#7aba2a" stroke-width="1.5" style="fill:rgb(13, 13, 13);stroke:rgb(122, 186, 42);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- blinking cursor line bottom -->
  <rect x="236" y="122" width="18" height="2.5" fill="#7aba2a" opacity="0.5" style="fill:rgb(122, 186, 42);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- prompt > symbol -->
  <path d="M238 88 L254 100 L238 112" fill="none" stroke="#7aba2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(122, 186, 42);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- LINUX in white -->
  <text x="316" y="108" font-family="monospace, 'Courier New'" font-size="32" font-weight="700" letter-spacing="4" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace, &quot;Courier New&quot;;font-size:32px;font-weight:700;text-anchor:start;dominant-baseline:auto">LINUX</text>

  <!-- QUEST in green -->
  <text x="316" y="140" font-family="monospace, 'Courier New'" font-size="32" font-weight="700" letter-spacing="4" fill="#7aba2a" style="fill:rgb(122, 186, 42);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace, &quot;Courier New&quot;;font-size:32px;font-weight:700;text-anchor:start;dominant-baseline:auto">QUEST</text>

</svg>